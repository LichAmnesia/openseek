name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (skeleton + biome)
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build bundle
        run: bun run build

      - name: Verify bundle size < 5 MB
        run: |
          size=$(stat -c%s dist/index.js)
          echo "bundle size: $size bytes"
          if [ "$size" -gt 5242880 ]; then
            echo "::error ::bundle exceeds 5 MB ($size bytes)"
            exit 1
          fi
